server:
  port: 8090

spring:
  application:
    name: traffic-data-collector

  # ===============================
  # 数据库：MariaDB 配置
  # ===============================
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/TD?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root

  # ===============================
  # Redis 配置
  # ===============================
  redis:
    host: localhost
    port: 6379
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  # ===============================
  # 邮件（163 SMTP）
  # ===============================
  mail:
    host: smtp.163.com
    username: sunwenjie202410@163.com
    password: SP39QB9YNwDA8hsp
    port: 465
    protocol: smtps
    default-encoding: UTF-8
    properties:
      mail.smtp.ssl.enable: true
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

# ===============================
# MyBatis-Plus 配置
# ===============================
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.utm.traffic.entity
